name: smoke (multilingual, manual)

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install minimal smoke dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests pyyaml huggingface_hub

      - name: Run multilingual smoke test
        env:
          RUN_SMOKE: "1"
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: PYTHONPATH=. python -m pytest tests/smoke/ -v
